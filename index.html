<!DOCTYPE html>
<html>
<head>
  <title>V.S.E Portal</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at top, #1a0033, #000);
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      padding: 20px;
      color: #c084fc;
      text-shadow: 0 0 20px #a855f7;
    }

    .card {
      background: rgba(20, 0, 50, 0.8);
      margin: 20px;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 0 25px #7a2fff;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 40px #c084fc;
    }

    .btn {
      background: linear-gradient(45deg, #7a2fff, #c084fc);
      padding: 10px 20px;
      border-radius: 10px;
      color: white;
      border: none;
      cursor: pointer;
    }

    .floating {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #c084fc;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 30px;   line-height: 60px;
      box-shadow: 0 0 25px purple;
    }
  </style>
</head>
<body>
<div class="card">
  <h2>🚪 Gerbang Masuk</h2>
  <p>Akses sistem utama V.S.E</p>
  <a href="portal.html">
    <button class="btn">Masuk</button>
  </a>
</div>

<div class="card">
  <h2>📡 Data Astronomi</h2>
  <p>Penelitian dan observasi luar angkasa</p>
</div>

<div class="card">
  <h2>👥 Komunitas</h2>
  <p>Anggota aktif V.S.E</p>
</div>

<div class="floating">+</div>

</body>
</html>
