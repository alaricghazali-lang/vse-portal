<!DOCTYPE html>
<html>
<head>
  <title>V.S.E Portal</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at top, #1a0033, #000);
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      padding: 20px;
      color: #c084fc;
      text-shadow: 0 0 20px #a855f7;
      animation:pulseJudul 2.5s infinite;
    }

    .card {
      background: rgba(20, 0, 50, 0.8);
      margin: 20px;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 0 25px #7a2fff;
      transition: 0.3s;
      cursor:pointer;
      position:relative;
overflow:hidden;
    }

    .card:hover{
transform:translateY(-8px) scale(1.03);
box-shadow:0 0 25px #b266ff, 0 0 45px #7a2fff;
border:1px solid #d9b3ff;
    }
    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 40px #c084fc;
    }

    .btn {
      background: linear-gradient(45deg, #7a2fff, #c084fc);
      padding: 10px 20px;
      border-radius: 10px;
      color: white;
      border: none;
      cursor: pointer;
    }

    .floating {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #c084fc;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 30px;   line-height: 60px;
      box-shadow: 0 0 25px purple;
    }

    .stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
radial-gradient(2px 2px at 20px 30px, white, transparent),
radial-gradient(2px 2px at 90px 80px, white, transparent),
radial-gradient(2px 2px at 160px 120px, white, transparent),
radial-gradient(2px 2px at 250px 60px, white, transparent),
radial-gradient(2px 2px at 320px 180px, white, transparent),
radial-gradient(2px 2px at 400px 100px, white, transparent);
background-size:500px 500px;
animation:gerakBintang 12s linear infinite;
z-index:-1;
opacity:0.81;
}

@keyframes gerakBintang{
from{
transform:translateY(0);
}
to{
transform:translateY(500px);
}
}
    @keyframes pulseJudul{
0%{
transform:scale(1);
text-shadow:0 0 10px #b266ff, 0 0 20px #7a2fff;
}
50%{
transform:scale(1.05);
text-shadow:0 0 20px #ffffff, 0 0 35px #b266ff;
}
100%{
transform:scale(1);
text-shadow:0 0 10px #b266ff, 0 0 20px #7a2fff;
}
    }
    .card::before{
content:"";
position:absolute;
top:-2px;
left:-2px;
right:-2px;
bottom:-2px;
background:linear-gradient(45deg,#00ffff,#8a2be2,#ff00ff,#00ffff);
background-size:400% 400%;
z-index:-1;
border-radius:18px;
animation:borderJalan 6s linear infinite;
}

@keyframes borderJalan{
0%{background-position:0% 50%;}
100%{background-position:400% 50%;}
      }
  </style>
</head>
<body>
  <div class="stars"></div>
  <h1>🚀 V.S.E PORTAL</h1>
<div class="card">
  <h2>🚪 Gerbang Masuk</h2>
  <p>Akses sistem utama V.S.E</p>
  <a href="portal.html" onclick="showLogo(event)">
<button class="btn">Masuk</button>
  </a>
    
 
</div>

<a href="astro.html" style="text-decoration:none; color:white;">
<div class="card">
<h2>🔭 Data Astronomi</h2>
<p>Penelitian dan observasi luar angkasa</p>
</div>
</a>
  
  


<a href="komunitas.html" style="text-decoration:none; color:white;">
<div class="card">
<h2>👥 Komunitas</h2>
<p>Bergabung dengan member V.S.E</p>
</div>
</a>
  


<div class="floating">+</div>
<div id="loadingLogo" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:9999; text-align:center;">
<img src="logo.png" id="spinLogo" style="width:220px; margin-top:45%; animation:spin 1.2s linear infinite;">
</div>

<style>
@keyframes spin {
from {transform:rotate(0deg);}
to {transform:rotate(360deg);}
}
</style>

<script>
function showLogo(event){
event.preventDefault();
document.getElementById("loadingLogo").style.display="block";
setTimeout(function(){
window.location.href="portal.html";
},1500);
}
</script>
</body>
</html>
